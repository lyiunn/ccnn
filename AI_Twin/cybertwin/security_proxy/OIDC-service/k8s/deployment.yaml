apiVersion: apps/v1
kind: Deployment
metadata:
  name: cybertwin-OIDC-service
  namespace: CCNN
  labels:
    app: cybertwin-OIDC-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cybertwin-OIDC-service
  template:
    metadata:
      labels:
        app: cybertwin-OIDC-service
    spec:
      containers:
        - name: cybertwin-OIDC-service
          image: CCNN/cybertwin-OIDC-service:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: oidc-env
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          startupProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 5
