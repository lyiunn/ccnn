apiVersion: v1
kind: ConfigMap
metadata:
  name: CCNN-frontend-nginx-config
  namespace: CCNN
data:
  nginx.conf: |
    server {
        listen       80;
        server_name  localhost;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, no-transform";
        }

        # SPA 入口
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # WebSocket 代理
        location /api/v1/chat/ws {
            proxy_pass http://user-agent.CCNN.svc.cluster.local:5050/api/v1/chat/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 60;
            proxy_send_timeout 60;
            proxy_connect_timeout 60;
        }

        # 聊天 HTTP 接口
        location /api/v1/chat/send {
            proxy_http_version 1.1;
            proxy_pass http://user-agent.CCNN.svc.cluster.local:5050/api/v1/chat/send;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 用户信息接口
        location /api/me {
            proxy_pass http://user-agent.CCNN.svc.cluster.local:5050/api/me;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 认证相关
        location /api/register {
            proxy_http_version 1.1;
            proxy_pass http://CCNN-backend.CCNN.svc.cluster.local:5000/api/register;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/login {
            proxy_http_version 1.1;
            proxy_pass http://CCNN-backend.CCNN.svc.cluster.local:5000/api/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/auth/login {
            proxy_http_version 1.1;
            proxy_pass http://CCNN-backend.CCNN.svc.cluster.local:5000/api/auth/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/keep-auth {
            proxy_http_version 1.1;
            proxy_pass http://CCNN-backend.CCNN.svc.cluster.local:5000/api/keep-auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OIDC 登录/登出
        location /login {
            proxy_http_version 1.1;
            proxy_pass http://user-agent.CCNN.svc.cluster.local:5050/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /logout {
            proxy_http_version 1.1;
            proxy_pass http://user-agent.CCNN.svc.cluster.local:5050/logout;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 医疗前端代理
        location /medical_frontend/ {
            proxy_http_version 1.1;
            proxy_pass http://medical-frontend.medical-agent.svc.cluster.local:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
